<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orson Quest Wiki</title>
  <style>
    :root{
      --bg:#071225;
      --bg2:#0c1b34;
      --panel:#0f213f;
      --panel2:#10284c;
      --line:rgba(122,164,230,.28);
      --text:#eaf2ff;
      --muted:#aac0e9;
      --btn:#1f3e75;
      --btn2:#2a5cad;
      --accent:#58d49b;
      --warn:#f3bc68;
      --danger:#ff8b8b;
      --shadow:0 14px 28px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto;
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(70,130,220,.28), transparent 55%),
        radial-gradient(900px 700px at 95% 0%, rgba(88,212,155,.16), transparent 50%),
        linear-gradient(180deg,var(--bg2),var(--bg));
    }
    a{color:#9fd0ff;text-decoration:none}
    a:hover{text-decoration:underline}

    .wrap{max-width:1280px;margin:0 auto;padding:18px}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .title{font-size:clamp(28px,4vw,42px);font-weight:900;letter-spacing:.02em;margin:0}
    .subtitle{color:var(--muted);margin-top:6px;max-width:820px}

    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:9px 13px;border-radius:12px;border:1px solid #3a67a8;
      background:linear-gradient(180deg,var(--btn2),var(--btn));
      color:#ecf4ff;font-weight:800;cursor:pointer;box-shadow:var(--shadow)
    }
    .btn.alt{background:linear-gradient(180deg,#17345f,#112646)}

    .layout{display:grid;grid-template-columns:290px 1fr;gap:14px;margin-top:14px}

    .toc{
      position:sticky;top:12px;align-self:start;
      background:linear-gradient(180deg,rgba(16,40,76,.85),rgba(13,31,58,.9));
      border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow)
    }
    .toc h2{margin:0 0 10px 0;font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:#d8e8ff}
    .toc a{display:block;padding:7px 8px;border-radius:9px;color:#cfe2ff;font-weight:650;font-size:14px}
    .toc a:hover{background:rgba(120,160,220,.14);text-decoration:none}

    .content{display:flex;flex-direction:column;gap:12px}
    .card{
      background:linear-gradient(180deg,rgba(16,40,76,.92),rgba(13,31,58,.95));
      border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)
    }
    .card h2{margin:0 0 10px 0;font-size:22px}
    .card h3{margin:12px 0 8px 0;font-size:17px}
    .lead{color:var(--muted)}

    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;border:1px solid;font-size:12px;font-weight:800}
    .c-common{color:#b8c9ea;border-color:#b8c9ea}
    .c-magic{color:#73c2ff;border-color:#73c2ff}
    .c-rare{color:#c193ff;border-color:#c193ff}
    .c-epic{color:#ffc36c;border-color:#ffc36c}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mini{background:rgba(10,24,45,.5);border:1px solid rgba(120,160,220,.24);border-radius:12px;padding:10px}
    ul{margin:8px 0 0 18px;padding:0}
    li{margin:6px 0}

    table{width:100%;border-collapse:collapse;font-size:14px;background:rgba(7,16,30,.45);border-radius:12px;overflow:hidden}
    th,td{padding:9px 8px;border-bottom:1px solid rgba(120,160,220,.22);text-align:left;vertical-align:top}
    th{background:rgba(30,58,102,.5);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:#dbe9ff}
    tr:last-child td{border-bottom:none}

    code{background:rgba(5,14,28,.8);border:1px solid rgba(120,160,220,.25);padding:2px 6px;border-radius:6px}
    .small{font-size:12px;color:var(--muted)}
    .sep{height:1px;background:linear-gradient(90deg,transparent,rgba(120,160,220,.45),transparent);margin:10px 0}

    @media (max-width:1060px){
      .layout{grid-template-columns:1fr}
      .toc{position:relative;top:auto}
    }
    @media (max-width:760px){
      .grid{grid-template-columns:1fr}
      .wrap{padding:12px}
      .card{padding:12px}
      .toc a{padding:8px 10px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div>
      <h1 class="title">📚 ORSON QUEST WIKI</h1>
      <div class="subtitle" id="subtitle"></div>
      <div class="chips" style="margin-top:8px">
        <span class="chip c-common" id="chipCommon"></span>
        <span class="chip c-magic" id="chipMagic"></span>
        <span class="chip c-rare" id="chipRare"></span>
        <span class="chip c-epic" id="chipEpic"></span>
      </div>
    </div>
    <div class="actions">
      <button class="btn alt" id="langBtn">🌐 FR</button>
      <a class="btn" href="/game" id="playBtn">🎮 Play</a>
    </div>
  </header>

  <div class="layout">
    <aside class="toc">
      <h2 id="tocTitle">Table of Contents</h2>
      <a href="#overview" id="toc1"></a>
      <a href="#formulas" id="toc2"></a>
      <a href="#rarity" id="toc3"></a>
      <a href="#drops" id="toc4"></a>
      <a href="#shop" id="toc5"></a>
      <a href="#items" id="toc6"></a>
      <a href="#enemies" id="toc7"></a>
      <a href="#quests" id="toc8"></a>
      <a href="#controls" id="toc9"></a>
    </aside>

    <main class="content">
      <section class="card" id="overview">
        <h2 id="overviewTitle"></h2>
        <p class="lead" id="overviewLead"></p>
        <div class="grid">
          <div class="mini"><h3 id="overviewCol1"></h3><ul id="overviewList1"></ul></div>
          <div class="mini"><h3 id="overviewCol2"></h3><ul id="overviewList2"></ul></div>
        </div>
      </section>

      <section class="card" id="formulas">
        <h2 id="formTitle"></h2>
        <div class="grid">
          <div class="mini"><h3 id="formCore"></h3><ul id="formCoreList"></ul></div>
          <div class="mini"><h3 id="formZones"></h3><ul id="formZoneList"></ul></div>
        </div>
      </section>

      <section class="card" id="rarity">
        <h2 id="rarityTitle"></h2>
        <table id="rarityTable"></table>
      </section>

      <section class="card" id="drops">
        <h2 id="dropTitle"></h2>
        <p class="small" id="dropLead"></p>
        <table id="dropTable"></table>
      </section>

      <section class="card" id="shop">
        <h2 id="shopTitle"></h2>
        <p class="small" id="shopLead"></p>
        <table id="shopTable"></table>
      </section>

      <section class="card" id="items">
        <h2 id="itemsTitle"></h2>
        <p class="small" id="itemsLead"></p>
        <table id="itemsTable"></table>
      </section>

      <section class="card" id="enemies">
        <h2 id="enemyTitle"></h2>
        <table id="enemyTable"></table>
      </section>

      <section class="card" id="quests">
        <h2 id="questTitle"></h2>
        <table id="questTable"></table>
      </section>

      <section class="card" id="controls">
        <h2 id="controlTitle"></h2>
        <ul id="controlList"></ul>
      </section>
    </main>
  </div>
</div>

  const i18n = {

  const state = { lang: (localStorage.getItem('orson_lang_v1')||'en') === 'fr' ? 'fr' : 'en' };
  const $ = (id) => document.getElementById(id);

  function table(el, headers, rows){

  function render(){

      s.items.join(', ')
    ]));

    $('itemsLead').textContent = t.itemsLead;
    table($('itemsTable'), t.itemsHdr, data.items.map(it=>[
      it.n,
      t.slots[it.s] || it.s,
      String(it.atk),
      String(it.def),
      String(it.hp),
      String(it.heal),
      String(it.v)
    ]));

      e.e,e.z,e.hp,e.atk,e.xp,e.g,e.note

    $('questTitle').textContent = t.questTitle;
    table($('questTable'), t.questHdr, data.quests.map(q=>[
      q.id,q.q,q.o,q.r
    ]));

    $('controlTitle').textContent = t.controlTitle;
    $('controlList').innerHTML = t.controls.map(x=>`<li>${x}</li>`).join('');
  }

  $('langBtn').addEventListener('click', ()=>{
    state.lang = state.lang === 'fr' ? 'en' : 'fr';
    localStorage.setItem('orson_lang_v1', state.lang);
    render();
  });

  render();
})();
</script>
</body>
</html>
